<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF表单工具 - 导航</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
  <!-- Admin entrance - small icon in top-right corner -->
  <a href="/static/admin.html" class="fixed top-4 right-4 w-9 h-9 bg-white/20 hover:bg-white/40 rounded-full flex items-center justify-center transition-all group z-10" title="管理者入口">
    <i class="fa-solid fa-gear text-white/50 group-hover:text-white text-sm transition-colors"></i>
  </a>

  <div class="max-w-xl w-full">
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full shadow-lg mb-6">
        <span class="text-2xl font-extrabold text-purple-600">PDF</span>
      </div>
      <h1 class="text-4xl font-bold text-white mb-3">PDF 表单填写工具</h1>
    </div>

    <!-- 用户界面 - 主入口 -->
    <a href="/static/user.html" class="card-hover block bg-white rounded-2xl p-8 shadow-lg cursor-pointer">
      <div class="flex items-center mb-4">
        <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mr-4">
          <i class="fa-solid fa-pen-to-square text-2xl text-blue-600"></i>
        </div>
        <div>
          <h2 class="text-xl font-bold text-gray-800">开始填写</h2>
          <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">User</span>
        </div>
      </div>
      <p class="text-gray-500 text-sm leading-relaxed">选择PDF模板，填写表单内容，支持单个填写和批量Excel导入，一键生成并下载PDF。</p>
    </a>
  </div>
</body>
</html>
